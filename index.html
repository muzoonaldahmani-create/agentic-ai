<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Agentic AI</title>
  <link rel="manifest" href="/agentic-ai/manifest.json">
  <meta name="theme-color" content="#2563EB">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #F5F6FA;
      --surface:   #FFFFFF;
      --border:    #E4E6EF;
      --accent:    #2563EB;
      --accent-soft:#EEF3FD;
      --text:      #1A1D2E;
      --text-muted:#7B7F9E;
      --user-bg:   #2563EB;
      --user-text: #FFFFFF;
      --ai-bg:     #FFFFFF;
      --ai-text:   #1A1D2E;
      --shadow:    0 2px 16px rgba(37,99,235,0.07);
      --radius:    16px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 1px 0 var(--border);
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-title span { color: var(--accent); }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      direction: ltr;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .welcome {
      margin: auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp .5s ease both;
    }

    .welcome-icon {
      width: 64px; height: 64px;
      background: var(--accent-soft);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome-icon svg { width:32px; height:32px; }

    .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text); }

    .welcome p {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 260px;
      line-height: 1.6;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp .3s ease both;
    }

    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.ai   { flex-direction: row; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .avatar.ai-avatar {
      background: var(--accent-soft);
      border: 1px solid var(--border);
    }

    .avatar.user-avatar {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 12px;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      word-wrap: break-word;
      direction: rtl;
      text-align: right;
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 8px rgba(37,99,235,.25);
    }

    .bubble.ai {
      background: var(--ai-bg);
      color: var(--ai-text);
      border-radius: 18px 18px 18px 4px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .bubble img {
      max-width: 200px;
      border-radius: 10px;
      margin-top: 8px;
      display: block;
    }

    /* ─── File Badge داخل فقاعة المستخدم ─── */
    .file-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 6px;
      direction: rtl;
    }

    .file-badge svg { width:14px; height:14px; flex-shrink:0; }

    /* ─── Memory Indicator ─── */
    .memory-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      margin: 4px 0;
      animation: fadeUp .3s ease both;
    }

    .memory-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22C55E;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp .3s ease both;
    }

    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      box-shadow: var(--shadow);
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      opacity: .4;
      animation: typingDot 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay:.2s; }
    .typing-bubble span:nth-child(3) { animation-delay:.4s; }

    @keyframes typingDot {
      0%,80%,100% { transform:translateY(0); opacity:.4; }
      40%          { transform:translateY(-5px); opacity:1; }
    }

    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
    }

    #preview-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--accent-soft);
      border: 1px solid #BFDBFE;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    #preview-bar img {
      width: 36px; height: 36px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .remove-btn {
      margin-right: auto;
      background: none;
      border: none;
      color: #93A8D4;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px;
      border-radius: 4px;
      transition: color .2s;
    }

    .remove-btn:hover { color: #EF4444; }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .attach-btns { display: flex; gap: 6px; }

    .attach-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 40px; height: 40px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }

    .attach-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .attach-btn svg { width: 18px; height: 18px; }

    textarea {
      flex: 1;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 16px;
      color: #1A1D2E;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 42px;
      line-height: 1.5;
      transition: border-color .2s;
    }

    textarea::placeholder { color: #6B7280; opacity: 1; }
    textarea:focus { border-color: var(--accent); background: #fff; }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 42px; height: 42px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(37,99,235,.3);
    }

    #send-btn:hover { background: #1D4ED8; transform:translateY(-1px); }
    #send-btn:active { transform:translateY(0); }
    #send-btn:disabled { background: var(--border); box-shadow:none; cursor:not-allowed; }
    #send-btn svg { width:18px; height:18px; }

    #img-input, #file-input { display:none; }

    .md-h1 { font-size: 17px; font-weight: 700; color: var(--text); margin: 10px 0 4px; }
    .md-h2 { font-size: 15px; font-weight: 600; color: var(--text); margin: 8px 0 4px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .md-h3 { font-size: 14px; font-weight: 600; color: var(--accent); margin: 6px 0 2px; }
    .md-li { padding: 3px 0 3px 8px; position: relative; }
    .md-hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="header-title">Your <span>Agentic AI</span></h1>
  </div>

  <div id="chat">
    <div class="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
          <rect x="4" y="7" width="16" height="12" rx="2" stroke="#1A1D2E" stroke-width="1.8"/>
          <rect x="7" y="11" width="3" height="3" rx="1" fill="#1A1D2E"/>
          <rect x="14" y="11" width="3" height="3" rx="1" fill="#1A1D2E"/>
          <path d="M9 18h6" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 7V4" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="3.5" r="1" fill="#1A1D2E"/>
          <path d="M4 13H2M22 13h-2" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>مرحباً، كيف أقدر أساعدك؟ 👋</h2>
      <p>اكتب سؤالك، أرسل صورة، أو ارفع مستنداً لتحليله</p>
      <div class="welcome-chips">
        <div class="chip" onclick="fillInput('لخّص لي هذا المستند')">📄 تلخيص مستند</div>
        <div class="chip" onclick="fillInput('ما هذه الصورة؟')">🔍 تحليل صورة</div>
        <div class="chip" onclick="fillInput('قيّم هذا التقرير')">📊 تقييم تقرير</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div id="preview-bar">
      <img id="preview-img" src="" alt="" style="display:none"/>
      <span id="preview-name"></span>
      <button class="remove-btn" onclick="removeAttachment()" title="إزالة">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
          <path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="input-row">
      <div class="attach-btns">
        <button class="attach-btn" title="إرسال صورة" onclick="document.getElementById('img-input').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
        <button class="attach-btn" title="رفع مستند أو PDF" onclick="document.getElementById('file-input').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </button>
      </div>

      <textarea id="msg-input" placeholder="مرحبا الساع، اكتب سؤالك هنا..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>

      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <input type="file" id="img-input" accept="image/*" onchange="attachImage(event)"/>
    <input type="file" id="file-input" accept=".pdf,.txt,.docx" onchange="attachFile(event)"/>
  </div>

<script>
  const N8N_WEBHOOK_URL = "https://mozoun.app.n8n.cloud/webhook/5c2b035c-0e1a-4772-9dc7-3267fdbaab92";

  let attachedFile = null;
  let fileType     = null;

  // ─── ذاكرة المحادثة ───
  let conversationHistory = [];   // تاريخ الرسائل كامل
  let savedDocBase64      = null; // الملف المرفوع محفوظ
  let savedDocType        = null; // نوع الملف
  let savedDocName        = null; // اسم الملف

  /* ─── Helpers ─── */
  function fillInput(text) {
    document.getElementById("msg-input").value = text;
    document.getElementById("msg-input").focus();
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function removeAttachment() {
    attachedFile = null; fileType = null;
    document.getElementById("preview-bar").style.display = "none";
    document.getElementById("img-input").value  = "";
    document.getElementById("file-input").value = "";
  }

  function attachImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    attachedFile = file; fileType = "image";
    const img = document.getElementById("preview-img");
    img.src = URL.createObjectURL(file);
    img.style.display = "block";
    document.getElementById("preview-name").textContent = file.name;
    document.getElementById("preview-bar").style.display = "flex";
  }

  function attachFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    attachedFile = file; fileType = "document";
    document.getElementById("preview-img").style.display = "none";
    document.getElementById("preview-name").textContent = "📄 " + file.name;
    document.getElementById("preview-bar").style.display = "flex";
  }

  /* ─── إضافة رسالة للشات ─── */
  function addMessage(role, text, imgSrc = null, fileName = null) {
    const chat = document.getElementById("chat");
    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const av = document.createElement("div");
    av.className = `avatar ${role === "ai" ? "ai-avatar" : "user-avatar"}`;
    av.innerHTML = role === "ai"
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none">
           <rect x="4" y="7" width="16" height="12" rx="2" stroke="#1A1D2E" stroke-width="1.8"/>
           <rect x="7" y="11" width="3" height="3" rx="1" fill="#1A1D2E"/>
           <rect x="14" y="11" width="3" height="3" rx="1" fill="#1A1D2E"/>
           <path d="M9 18h6" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
           <path d="M12 7V4" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
           <circle cx="12" cy="3.5" r="1" fill="#1A1D2E"/>
           <path d="M4 13H2M22 13h-2" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
         </svg>`
      : "أنا";

    const bub = document.createElement("div");
    bub.className = `bubble ${role}`;
    bub.innerHTML = formatText(text);

    // ─── عرض الصورة ───
    if (imgSrc) {
      const img = document.createElement("img");
      img.src = imgSrc;
      bub.appendChild(img);
    }

    // ─── عرض badge الملف ───
    if (fileName) {
      const badge = document.createElement("div");
      badge.className = "file-badge";
      badge.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        ${fileName}`;
      bub.appendChild(badge);
    }

    if (role === "ai") {
      row.appendChild(av);
      row.appendChild(bub);
    } else {
      row.appendChild(bub);
      row.appendChild(av);
    }

    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  /* ─── مؤشر الذاكرة ─── */
  function showMemoryIndicator() {
    const chat = document.getElementById("chat");
    const indicator = document.createElement("div");
    indicator.className = "memory-indicator";
    indicator.innerHTML = `<div class="memory-dot"></div> الذاكرة تعمل — يتذكر المستند`;
    chat.appendChild(indicator);
    chat.scrollTop = chat.scrollHeight;
  }

  function formatText(t) {
    t = t.replace(/^\|.*\|$/gm, '');
    t = t.replace(/^\|?[\s\-\|]+\|?$/gm, '');
    return t
      .replace(/^### (.+)$/gm, '<div class="md-h3">$1</div>')
      .replace(/^## (.+)$/gm, '<div class="md-h2">$1</div>')
      .replace(/^# (.+)$/gm, '<div class="md-h1">$1</div>')
      .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^---+$/gm, '<hr class="md-hr"/>')
      .replace(/^[\-•♦◆▪] (.+)$/gm, '<div class="md-li">$1</div>')
      .replace(/^\d+\. (.+)$/gm, '<div class="md-li">$1</div>')
      .replace(/\n{3,}/g, '\n\n')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    const chat = document.getElementById("chat");
    const row = document.createElement("div");
    row.className = "typing-row"; row.id = "typing-indicator";
    row.innerHTML = `
      <div class="avatar ai-avatar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <rect x="4" y="7" width="16" height="12" rx="2" stroke="#1A1D2E" stroke-width="1.8"/>
          <rect x="7" y="11" width="3" height="3" rx="1" fill="#1A1D2E"/>
          <rect x="14" y="11" width="3" height="3" rx="1" fill="#1A1D2E"/>
          <path d="M9 18h6" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 7V4" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="3.5" r="1" fill="#1A1D2E"/>
          <path d="M4 13H2M22 13h-2" stroke="#1A1D2E" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="typing-bubble"><span></span><span></span><span></span></div>`;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  /* ─── الإرسال الرئيسي ─── */
  async function sendMessage() {
    const input = document.getElementById("msg-input");
    const text  = input.value.trim();
    const btn   = document.getElementById("send-btn");
    if (!text && !attachedFile) return;

    const currentFile = attachedFile;
    const currentType = fileType;

    // عرض رسالة المستخدم مع اسم الملف إن وُجد
    const imgPreview = currentType === "image" ? URL.createObjectURL(currentFile) : null;
    const showName   = currentType === "document" ? currentFile.name : null;
    const displayText = text || (currentType === "image" ? "صورة مرفقة 📷" : "");
    addMessage("user", displayText, imgPreview, showName);

    input.value = ""; input.style.height = "auto"; btn.disabled = true;
    removeAttachment();
    showTyping();

    try {
      let response;

      /* ══════════════════════════════
         1) صورة جديدة
      ══════════════════════════════ */
      if (currentFile && currentType === "image") {
        const base64 = await toBase64(currentFile);
        response = await fetch(N8N_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message:  text || "حلل هذه الصورة وصفها بالتفصيل",
            type:     "image",
            fileData: base64.split(',')[1],
            fileType: currentFile.type
          })
        });

      /* ══════════════════════════════
         2) ملف PDF جديد — احفظه في الذاكرة
      ══════════════════════════════ */
      } else if (currentFile && currentType === "document") {
        const base64 = await toBase64(currentFile);
        const fileData = base64.split(',')[1];

        response = await fetch(N8N_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message:  text || "لخص هذا المستند وأعطني أهم النقاط",
            type:     "document",
            fileData: fileData,
            fileType: currentFile.type,
            fileName: currentFile.name
          })
        });

      /* ══════════════════════════════
         3) نص عادي — مع ذاكرة الملف إن وُجد
      ══════════════════════════════ */
      } else {
        // نص عادي — دايماً للـ AI Agent
        response = await fetch(N8N_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, type: "text" })
        });
      }

      const data = await response.json();
      const reply = data.reply || "لم أتلقَّ رداً.";

      hideTyping();
      addMessage("ai", reply);

      // احفظ رد الـ AI في التاريخ (للملفات فقط)
      if (currentType === "document") {
        conversationHistory.push({ role: "assistant", content: reply });
      }

    } catch (err) {
      hideTyping();
      addMessage("ai", "⚠️ تعذّر الاتصال بالخادم. تأكد من إعداد n8n.");
      console.error(err);
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
