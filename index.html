<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agentic AI — Defense Intelligence</title>
  <link rel="manifest" href="/agentic-ai/manifest.json">
  <meta name="theme-color" content="#F8F9FC">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#F8F9FC; --bg2:#FFFFFF; --surface:#FFFFFF; --surface2:#F2F4F8;
      --border:#E2E6EF; --border2:#CBD2E0;
      --navy:#1B2A4A; --navy2:#243660;
      --blue:#1D4ED8; --blue-soft:#EEF3FD; --blue-light:#DBEAFE;
      --text:#1B2A4A; --text2:#4A5568; --text3:#94A3B8;
      --red:#DC2626; --green:#059669;
      --shadow-sm:0 1px 4px rgba(27,42,74,0.06);
      --shadow:0 4px 16px rgba(27,42,74,0.09);
      --radius:10px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    .header{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
    .header-left{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .header-divider{display:none;}
    .header-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:0.5px;text-align:center;}
    .header-sub{font-size:11px;color:rgba(255,255,255,0.45);font-weight:400;letter-spacing:1px;text-align:center;}
    .header-status{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.5);position:absolute;left:24px;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:#34D399;animation:pulse 2.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    .nav-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:2px;flex-shrink:0;}
    .nav-tab{display:flex;align-items:center;gap:7px;padding:13px 16px 11px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;}
    .nav-tab svg{width:14px;height:14px;}
    .nav-tab:hover{color:var(--text2);}
    .nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
    .tab-badge{background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:600;border-radius:8px;padding:1px 6px;}
    .page{display:none;flex:1;overflow:hidden;flex-direction:column;}
    .page.active{display:flex;}
    .news-toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .toolbar-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;}
    .source-filters{display:flex;gap:6px;flex:1;flex-wrap:wrap;}
    .source-btn{font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;}
    .source-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft);}
    .source-btn.active{border-color:var(--blue);background:var(--blue-soft);color:var(--blue);font-weight:600;}
    .refresh-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 13px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
    .refresh-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft);}
    .refresh-btn svg{width:13px;height:13px;}
    .refresh-btn.loading svg{animation:spin .9s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .news-feed{flex:1;overflow-y:auto;padding:20px 24px;background:var(--bg);}
    .news-feed::-webkit-scrollbar{width:5px;}
    .news-feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
    .skeleton-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
    .skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
    .skel{background:var(--surface2);border-radius:4px;margin-bottom:8px;animation:shimmer 1.4s ease-in-out infinite;}
    .skel.h8{height:8px;} .skel.h12{height:12px;} .skel.w40{width:40%;} .skel.w70{width:70%;} .skel.w100{width:100%;}
    @keyframes shimmer{0%,100%{opacity:.5;}50%{opacity:1;}}
    .source-section{margin-bottom:28px;}
    .source-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .source-name{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;}
    .source-tag-pill{font-size:10px;font-weight:600;color:var(--blue);background:var(--blue-light);border-radius:4px;padding:2px 7px;}
    .source-sep{flex:1;height:1px;background:var(--border);}
    .source-art-count{font-size:11px;color:var(--text3);white-space:nowrap;}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
    .news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-decoration:none;display:flex;flex-direction:column;gap:9px;transition:all .18s;cursor:pointer;}
    .news-card:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-1px);}
    .card-top{display:flex;align-items:center;justify-content:space-between;}
    .card-src{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.6px;}
    .card-time{font-size:10px;color:var(--text3);}
    .card-title{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-align:right;}
    .news-card:hover .card-title{color:var(--blue);}
    .card-snippet{font-size:12px;color:var(--text2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-align:right;}
    .card-footer{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);}
    .card-read{font-size:11px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s;}
    .news-card:hover .card-read{opacity:1;}
    .card-read svg{width:11px;height:11px;}
    .news-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--text3);font-size:13px;}
    #chat{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;background:var(--bg);direction:ltr;}
    #chat::-webkit-scrollbar{width:5px;}
    #chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
    .welcome{margin:auto;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;animation:fadeUp .4s ease both;max-width:320px;}
    .welcome-icon{width:52px;height:52px;background:var(--blue-soft);border:1px solid var(--blue-light);border-radius:14px;display:flex;align-items:center;justify-content:center;}
    .welcome-icon svg{width:24px;height:24px;color:var(--blue);}
    .welcome h2{font-size:17px;font-weight:700;color:var(--navy);}
    .welcome p{font-size:12.5px;color:var(--text2);line-height:1.7;}
    .welcome-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
    .chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 13px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;}
    .chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft);}
    .msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeUp .25s ease both;}
    .msg-row.user{flex-direction:row-reverse;}
    .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
    .ai-avatar{background:var(--blue-soft);border:1px solid var(--blue-light);}
    .ai-avatar svg{width:14px;height:14px;color:var(--blue);}
    .user-avatar{background:var(--navy);color:#fff;font-weight:600;font-size:11px;}
    .bubble{max-width:74%;padding:11px 15px;font-size:13.5px;line-height:1.7;word-wrap:break-word;direction:rtl;text-align:right;}
    .bubble.user{background:var(--navy);color:#fff;border-radius:14px 14px 4px 14px;}
    .bubble.ai{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:14px 14px 14px 4px;box-shadow:var(--shadow-sm);}
    .bubble img{max-width:180px;border-radius:8px;margin-top:8px;display:block;}
    .file-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:7px;padding:4px 10px;font-size:11.5px;font-weight:500;margin-top:6px;}
    .file-badge svg{width:13px;height:13px;}
    .typing-row{display:flex;align-items:flex-end;gap:8px;animation:fadeUp .25s ease both;}
    .typing-bubble{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:13px 16px;display:flex;gap:5px;box-shadow:var(--shadow-sm);}
    .typing-bubble span{width:6px;height:6px;background:var(--blue);border-radius:50%;opacity:.35;animation:typingDot 1.2s infinite;}
    .typing-bubble span:nth-child(2){animation-delay:.2s;}
    .typing-bubble span:nth-child(3){animation-delay:.4s;}
    @keyframes typingDot{0%,80%,100%{transform:translateY(0);opacity:.35;}40%{transform:translateY(-4px);opacity:1;}}
    .input-area{background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px 14px;flex-shrink:0;}
    #preview-bar{display:none;align-items:center;gap:10px;background:var(--blue-soft);border:1px solid var(--blue-light);border-radius:8px;padding:7px 12px;margin-bottom:10px;font-size:12px;color:var(--blue);font-weight:500;}
    #preview-bar img{width:32px;height:32px;object-fit:cover;border-radius:5px;}
    .remove-btn{margin-right:auto;background:none;border:none;color:var(--text3);cursor:pointer;padding:2px;border-radius:4px;transition:color .15s;}
    .remove-btn:hover{color:var(--red);}
    .input-row{display:flex;align-items:flex-end;gap:8px;}
    .attach-btns{display:flex;gap:5px;}
    .attach-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text3);width:38px;height:38px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
    .attach-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft);}
    .attach-btn svg{width:16px;height:16px;}
    textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:13.5px;font-family:'IBM Plex Sans Arabic',sans-serif;resize:none;outline:none;max-height:110px;min-height:38px;line-height:1.5;transition:border-color .15s;}
    textarea::placeholder{color:var(--text3);}
    textarea:focus{border-color:var(--blue);background:var(--surface);}
    #send-btn{background:var(--blue);border:none;color:#fff;width:38px;height:38px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;box-shadow:0 2px 8px rgba(29,78,216,.25);}
    #send-btn:hover{background:#1e40af;transform:translateY(-1px);}
    #send-btn:disabled{background:var(--border);box-shadow:none;cursor:not-allowed;transform:none;}
    #send-btn svg{width:16px;height:16px;}
    #img-input,#file-input{display:none;}
    .md-h1{font-size:16px;font-weight:700;color:var(--navy);margin:10px 0 4px;}
    .md-h2{font-size:14px;font-weight:600;color:var(--navy);margin:8px 0 4px;border-bottom:1px solid var(--border);padding-bottom:4px;}
    .md-h3{font-size:13.5px;font-weight:600;color:var(--blue);margin:6px 0 2px;}
    .md-li{padding:3px 0 3px 8px;}
    .md-hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>

<script>
const N8N_WEBHOOK_URL="https://mozoun.app.n8n.cloud/webhook/5c2b035c-0e1a-4772-9dc7-3267fdbaab92";
const RSS_SOURCES=[
  {id:'warzone',label:'THE WAR ZONE',tag:'مسيّرات',url:'https://www.thedrive.com/the-war-zone/rss'},
  {id:'defensescoop',label:'DEFENSE SCOOP',tag:'ذكاء اصطناعي',url:'https://defensescoop.com/feed/'},
  {id:'breakingdefense',label:'BREAKING DEFENSE',tag:'دفاع شامل',url:'https://breakingdefense.com/feed/'},
  {id:'defensenews',label:'DEFENSE NEWS',tag:'أخبار دفاعية',url:'https://www.defensenews.com/arc/outboundfeeds/rss/'}
];
let allArticles=[],activeFilter='all';

function switchTab(tab){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
}

async function translateText(text){
  if(!text||text.trim()==='')return text;
  try{
    const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,350))}&langpair=en|ar`);
    const data=await res.json();
    if(data.responseStatus===200&&data.responseData?.translatedText)
      return data.responseData.translatedText;
  }catch(e){}
  return text;
}

async function translateArticles(articles){
  const result=[];
  for(let i=0;i<articles.length;i+=4){
    const chunk=articles.slice(i,i+4);
    const translated=await Promise.all(chunk.map(async a=>({
      ...a,
      title: await translateText(a.title),
      snippet: a.snippet? await translateText(a.snippet):''
    })));
    result.push(...translated);
  }
  return result;
}

async function fetchRSS(source){
  let items=[];
  try{
    const res=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&count=10`);
    const data=await res.json();
    if(data.status==='ok'&&data.items?.length)
      items=data.items.map(item=>({sourceId:source.id,sourceLabel:source.label,sourceTag:source.tag,title:item.title||'',snippet:stripHtml(item.description||item.content||'').slice(0,120),link:item.link||'',date:relTime(item.pubDate)}));
  }catch(e){}
  if(!items.length){
    try{
      const r2=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(source.url)}`);
      const j2=await r2.json();
      items=parseXML(j2.contents,source);
    }catch(e){return[];}
  }
  return await translateArticles(items);
}

function parseXML(xml,source){
  try{
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    return Array.from(doc.querySelectorAll('item')).slice(0,10).map(item=>({sourceId:source.id,sourceLabel:source.label,sourceTag:source.tag,title:item.querySelector('title')?.textContent?.trim()||'',snippet:stripHtml(item.querySelector('description')?.textContent||'').slice(0,130),link:item.querySelector('link')?.textContent?.trim()||'',date:relTime(item.querySelector('pubDate')?.textContent)}));
  }catch(e){return[];}
}

function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent||'';}
function relTime(ds){if(!ds)return'';try{const diff=Math.floor((Date.now()-new Date(ds))/60000);if(diff<60)return`منذ ${diff} د`;if(diff<1440)return`منذ ${Math.floor(diff/60)} س`;return`منذ ${Math.floor(diff/1440)} ي`;}catch(e){return'';}}

async function loadAllNews(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('loading');
  document.getElementById('news-feed').innerHTML='<div class="skeleton-wrap"><div class="skeleton-card"><div class="skel h8 w40"></div><div class="skel h12 w100"></div><div class="skel h8 w70"></div></div><div class="skeleton-card"><div class="skel h8 w40"></div><div class="skel h12 w100"></div><div class="skel h8 w70"></div></div><div class="skeleton-card"><div class="skel h8 w40"></div><div class="skel h12 w100"></div><div class="skel h8 w70"></div></div><div class="skeleton-card"><div class="skel h8 w40"></div><div class="skel h12 w100"></div><div class="skel h8 w70"></div></div></div>';
  const results=await Promise.allSettled(RSS_SOURCES.map(s=>fetchRSS(s)));
  allArticles=results.flatMap(r=>r.status==='fulfilled'?r.value:[]);
  document.getElementById('news-count').textContent=allArticles.length||'—';
  btn.classList.remove('loading');
  renderNews();
}

function filterSource(id,el){
  activeFilter=id;
  document.querySelectorAll('.source-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderNews();
}

function renderNews(){
  const feed=document.getElementById('news-feed');
  const list=activeFilter==='all'?allArticles:allArticles.filter(a=>a.sourceId===activeFilter);
  if(!list.length){feed.innerHTML='<div class="news-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>لا توجد مقالات متاحة</span></div>';return;}
  const groups={};
  list.forEach(a=>{if(!groups[a.sourceId])groups[a.sourceId]={label:a.sourceLabel,tag:a.sourceTag,items:[]};groups[a.sourceId].items.push(a);});
  feed.innerHTML=Object.values(groups).map(g=>`
    <div class="source-section">
      <div class="source-header">
        <span class="source-name">${g.label}</span>
        <span class="source-tag-pill">${g.tag}</span>
        <div class="source-sep"></div>
        <span class="source-art-count">${g.items.length} مقالة</span>
      </div>
      <div class="cards-grid">
        ${g.items.map(a=>`
          <a class="news-card" href="${a.link}" target="_blank" rel="noopener">
            <div class="card-top"><span class="card-src">${g.label}</span><span class="card-time">${a.date}</span></div>
            <div class="card-title">${a.title}</div>
            ${a.snippet?`<div class="card-snippet">${a.snippet}…</div>`:''}
            <div class="card-footer"><div class="card-read">قراءة المقال <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div></div>
          </a>`).join('')}
      </div>
    </div>`).join('');
}

let attachedFile=null,fileType=null;
function fillInput(text){switchTab('chat');document.getElementById('msg-input').value=text;document.getElementById('msg-input').focus();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function removeAttachment(){attachedFile=null;fileType=null;document.getElementById('preview-bar').style.display='none';document.getElementById('img-input').value='';document.getElementById('file-input').value='';}
function attachImage(event){const f=event.target.files[0];if(!f)return;attachedFile=f;fileType='image';const img=document.getElementById('preview-img');img.src=URL.createObjectURL(f);img.style.display='block';document.getElementById('preview-name').textContent=f.name;document.getElementById('preview-bar').style.display='flex';}
function attachFile(event){const f=event.target.files[0];if(!f)return;attachedFile=f;fileType='document';document.getElementById('preview-img').style.display='none';document.getElementById('preview-name').textContent='📄 '+f.name;document.getElementById('preview-bar').style.display='flex';}

function addMessage(role,text,imgSrc=null,fileName=null){
  const chat=document.getElementById('chat');
  const welcome=chat.querySelector('.welcome');if(welcome)welcome.remove();
  const row=document.createElement('div');row.className=`msg-row ${role}`;
  const av=document.createElement('div');av.className=`avatar ${role==='ai'?'ai-avatar':'user-avatar'}`;
  av.innerHTML=role==='ai'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>':'أنا';
  const bub=document.createElement('div');bub.className=`bubble ${role}`;bub.innerHTML=formatText(text);
  if(imgSrc){const i=document.createElement('img');i.src=imgSrc;bub.appendChild(i);}
  if(fileName){const b=document.createElement('div');b.className='file-badge';b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+fileName;bub.appendChild(b);}
  if(role==='ai'){row.appendChild(av);row.appendChild(bub);}else{row.appendChild(bub);row.appendChild(av);}
  chat.appendChild(row);chat.scrollTop=chat.scrollHeight;
}

function formatText(t){
  t=t.replace(/^\|.*\|$/gm,'').replace(/^\|?[\s\-\|]+\|?$/gm,'');
  return t.replace(/^### (.+)$/gm,'<div class="md-h3">$1</div>').replace(/^## (.+)$/gm,'<div class="md-h2">$1</div>').replace(/^# (.+)$/gm,'<div class="md-h1">$1</div>').replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/^---+$/gm,'<hr class="md-hr"/>').replace(/^[\-•] (.+)$/gm,'<div class="md-li">$1</div>').replace(/^\d+\. (.+)$/gm,'<div class="md-li">$1</div>').replace(/\n{3,}/g,'\n\n').replace(/\n/g,'<br>');
}

function showTyping(){const chat=document.getElementById('chat');const row=document.createElement('div');row.className='typing-row';row.id='typing-indicator';row.innerHTML='<div class="avatar ai-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="typing-bubble"><span></span><span></span><span></span></div>';chat.appendChild(row);chat.scrollTop=chat.scrollHeight;}
function hideTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}

async function sendMessage(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  const btn=document.getElementById('send-btn');
  if(!text&&!attachedFile)return;
  const cf=attachedFile,ct=fileType;
  addMessage('user',text||(ct==='image'?'صورة مرفقة 📷':''),ct==='image'?URL.createObjectURL(cf):null,ct==='document'?cf.name:null);
  input.value='';input.style.height='auto';btn.disabled=true;
  removeAttachment();showTyping();
  try{
    let body;
    if(cf&&ct==='image'){const b64=await toBase64(cf);body={message:text||'حلل هذه الصورة',type:'image',fileData:b64.split(',')[1],fileType:cf.type};}
    else if(cf&&ct==='document'){const b64=await toBase64(cf);body={message:text||'لخص هذا المستند',type:'document',fileData:b64.split(',')[1],fileType:cf.type,fileName:cf.name};}
    else{body={message:text,type:'text'};}
    const res=await fetch(N8N_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    hideTyping();addMessage('ai',data.reply||'لم أتلقَّ رداً.');
  }catch(err){hideTyping();addMessage('ai','⚠️ تعذّر الاتصال بالخادم.');}
  btn.disabled=false;input.focus();
}

loadAllNews();
</script>
